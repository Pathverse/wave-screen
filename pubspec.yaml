name: wave_screen
description: "Composable, GPU-shader-driven animated wave surfaces for Flutter — build a Wave from swappable shape, style, and motion traits."
version: 0.1.0
homepage: https://github.com/Pathverse/wave-screen
repository: https://github.com/Pathverse/wave-screen
issue_tracker: https://github.com/Pathverse/wave-screen/issues

environment:
  sdk: ^3.11.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  shaders:
    - shaders/wave.frag